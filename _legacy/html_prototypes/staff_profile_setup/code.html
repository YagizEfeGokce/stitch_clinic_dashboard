<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Profile Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d968b",
                        "secondary": "#E0AFA0", // Rose gold approximation for accents
                        "background-light": "#f8fcfb", // Slightly tweaked for that clinical clean feel
                        "background-dark": "#102220",
                        "text-main": "#0d1b1a",
                        "text-muted": "#4c9a93",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-text-main dark:text-white transition-colors duration-200">
<div class="relative flex h-full min-h-screen w-full max-w-md mx-auto flex-col group/design-root overflow-hidden shadow-2xl">
<!-- Top App Bar -->
<div class="sticky top-0 z-20 flex items-center bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md p-4 pb-2 justify-between border-b border-gray-100 dark:border-gray-800">
<button class="text-text-main dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-text-main dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Setup Profile</h2>
<button class="flex w-12 items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<p class="text-primary text-base font-bold leading-normal tracking-[0.015em] shrink-0">Skip</p>
</button>
</div>
<!-- Main Scrollable Content -->
<div class="flex-1 overflow-y-auto no-scrollbar pb-32">
<!-- Profile Picture Section -->
<div class="flex p-6 flex-col items-center justify-center">
<div class="relative group cursor-pointer">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 shadow-lg ring-4 ring-white dark:ring-background-dark object-cover" data-alt="Placeholder for user profile picture upload" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAoZmE8OcGHtnlPQGatPn5TC180GDGSXetHKCCyFGJT3WYjPDum2POAL69BtGzrrNJUkt8IV5h5tYiElYooWJd7ZLHPZeCFwvOsSlzL6PB3D8vGNgdut0Lcn1hV22SnGJ4qf7r82G21T6mJAvxQzjZ8ed4gXoWhke8-rLr1hhgEbAwMhjQLCxEDs2DZsq-5autyoGlrRGvZ1bkpHzZ8sTEQfgEuEYgIE8W2Ha4nYGxX7_KOgjRLFZ5B0R2J23vVydxv-U0T5GlzopxO");'>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-md border-[3px] border-background-light dark:border-background-dark flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">photo_camera</span>
</div>
</div>
<div class="mt-4 flex flex-col items-center justify-center">
<p class="text-text-main dark:text-white text-[22px] font-bold leading-tight tracking-[-0.015em] text-center">Dr. Sarah Smith</p>
<p class="text-secondary text-base font-medium leading-normal text-center mt-1">Tap to change photo</p>
</div>
</div>
<div class="h-px w-full bg-gradient-to-r from-transparent via-gray-200 dark:via-gray-700 to-transparent my-2"></div>
<!-- Personal Details Section -->
<div class="px-4 pt-4 pb-2">
<h3 class="text-text-main dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">person</span>
                    Personal Details
                </h3>
<!-- Full Name Input -->
<div class="mb-5">
<label class="block">
<p class="text-text-main dark:text-gray-300 text-sm font-semibold leading-normal pb-2 ml-1">Full Name</p>
<div class="relative">
<input class="w-full rounded-xl text-text-main dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 h-14 placeholder:text-gray-400 p-[15px] text-base font-normal leading-normal transition-all shadow-sm" placeholder="e.g. Sarah Smith" value="Dr. Sarah Smith"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-primary opacity-0 check-icon transition-opacity">
<span class="material-symbols-outlined">check_circle</span>
</span>
</div>
</label>
</div>
<!-- Email Input -->
<div class="mb-5">
<label class="block">
<p class="text-text-main dark:text-gray-300 text-sm font-semibold leading-normal pb-2 ml-1">Email Address</p>
<input class="w-full rounded-xl text-text-main dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 h-14 placeholder:text-gray-400 p-[15px] text-base font-normal leading-normal transition-all shadow-sm" placeholder="name@clinic.com" type="email" value=""/>
</label>
</div>
<!-- Phone Input -->
<div class="mb-5">
<label class="block">
<p class="text-text-main dark:text-gray-300 text-sm font-semibold leading-normal pb-2 ml-1">Phone Number</p>
<input class="w-full rounded-xl text-text-main dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 h-14 placeholder:text-gray-400 p-[15px] text-base font-normal leading-normal transition-all shadow-sm" placeholder="+1 (555) 000-0000" type="tel" value=""/>
</label>
</div>
</div>
<div class="h-px w-full bg-gradient-to-r from-transparent via-gray-200 dark:via-gray-700 to-transparent my-2"></div>
<!-- Professional Role Section -->
<div class="px-4 pt-4 pb-6">
<h3 class="text-text-main dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">stethoscope</span>
                    Clinic Role
                </h3>
<!-- Role Selector -->
<div class="mb-5 relative">
<label class="block">
<p class="text-text-main dark:text-gray-300 text-sm font-semibold leading-normal pb-2 ml-1">Position</p>
<div class="relative">
<select class="w-full appearance-none rounded-xl text-text-main dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 h-14 placeholder:text-gray-400 p-[15px] pr-10 text-base font-normal leading-normal transition-all shadow-sm">
<option disabled="" selected="" value="">Select your role</option>
<option value="aesthetician">Lead Aesthetician</option>
<option value="dermatologist">Dermatologist</option>
<option value="nurse">Cosmetic Nurse</option>
<option value="receptionist">Clinic Coordinator</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-primary">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</label>
</div>
<!-- Bio Textarea -->
<div class="mb-2">
<label class="block">
<p class="text-text-main dark:text-gray-300 text-sm font-semibold leading-normal pb-2 ml-1">Short Bio &amp; Specialization</p>
<textarea class="w-full rounded-xl text-text-main dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 min-h-[120px] placeholder:text-gray-400 p-[15px] text-base font-normal leading-normal transition-all shadow-sm resize-none" placeholder="Briefly describe your expertise..."></textarea>
</label>
<p class="text-xs text-gray-400 mt-2 text-right">0/300 characters</p>
</div>
</div>
<!-- Spacer for fixed bottom button -->
<div class="h-24"></div>
</div>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-xl border-t border-gray-100 dark:border-gray-800 z-30">
<button class="w-full h-14 bg-primary hover:bg-teal-700 active:scale-[0.98] transition-all rounded-xl shadow-lg shadow-teal-900/10 flex items-center justify-center gap-2 group">
<span class="text-white text-lg font-bold tracking-wide">Save Profile</span>
<span class="material-symbols-outlined text-white group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</body></html>
