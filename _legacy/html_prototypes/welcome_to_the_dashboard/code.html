<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Welcome to the Dashboard</title>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d968b",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102220",
                        "rose-gold": "#D88D7F", 
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-[#0d1b1a] dark:text-[#f8fcfb] antialiased selection:bg-rose-gold/30">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden bg-background-light dark:bg-background-dark group/design-root">
<!-- Hero Section with Premium Image -->
<!-- Added a curved bottom to soften the look, typical of modern mobile designs -->
<div class="relative w-full h-[45vh] shrink-0">
<div class="absolute inset-0 bg-gray-200 rounded-b-[2.5rem] overflow-hidden shadow-sm">
<div class="w-full h-full bg-cover bg-center transition-transform duration-700 hover:scale-105" data-alt="Soft focus serene spa interior with minimalist decor and warm lighting" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAKc4GoaTGg7oEMrDjUzPXEXMTC0uRZ_BuztHy5uWTj_lS6P6r3UkXC_iNKBlwijLK-sIuTr_s_iOW5dUojpOHoom-DV2TewlmnQBt6RFlieooQwSTfNnHV3n5nUtB8mnCZ1du5_qr_ZdVJIa17Ac9V-24t_PEL7C8CspZfUqWrhHh7gG6kTjt-V-2XXA31WgYioNdizFsELGlejc0JyjhI7jSw8Mi9dLy8OEX0JFsHfD7jCKHueKTGmNGsjefCK7P9etRNaVRSgpn3");'>
</div>
<!-- Gradient Overlay for text readability transition -->
<div class="absolute inset-0 bg-gradient-to-t from-background-light via-transparent to-transparent dark:from-background-dark opacity-90"></div>
</div>
</div>
<!-- Main Content Container -->
<!-- Negative margin pulls content up to overlap the image slightly for depth -->
<div class="relative z-10 flex flex-col flex-1 px-6 -mt-16 items-center">
<!-- Logo Brand Mark -->
<div class="mb-6 flex h-24 w-24 items-center justify-center rounded-full bg-white dark:bg-[#1a2e2c] shadow-xl shadow-gray-200/50 dark:shadow-black/40 ring-4 ring-white dark:ring-[#1a2e2c]">
<span class="material-symbols-outlined text-[40px] text-primary">spa</span>
</div>
<!-- Welcoming Typography -->
<div class="flex flex-col gap-3 text-center w-full max-w-sm">
<h1 class="text-[#0d1b1a] dark:text-white tracking-tight text-[32px] font-bold leading-tight">
                    Welcome to <br/>
<span class="text-primary">Aura Aesthetics</span>
</h1>
<p class="text-gray-500 dark:text-gray-400 text-base font-medium leading-relaxed px-2">
                    Your digital hub for excellence in aesthetic care. Manage appointments, clients, and treatments with precision.
                </p>
</div>
<!-- Dashboard Preview / Quick Feature Icons -->
<!-- These visual cues hint at what's inside the dashboard -->
<div class="mt-8 grid grid-cols-3 gap-4 w-full max-w-[340px]">
<!-- Item 1 -->
<div class="group flex flex-col items-center gap-2 p-3 rounded-2xl bg-white dark:bg-[#152826] shadow-sm border border-transparent hover:border-primary/20 transition-all">
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">calendar_month</span>
</div>
<span class="text-xs font-bold text-gray-600 dark:text-gray-300 tracking-wide">Schedule</span>
</div>
<!-- Item 2 - Rose Gold Accent -->
<div class="group flex flex-col items-center gap-2 p-3 rounded-2xl bg-white dark:bg-[#152826] shadow-sm border border-transparent hover:border-rose-gold/40 transition-all">
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-rose-gold/10 text-rose-gold group-hover:bg-rose-gold group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">diversity_1</span>
</div>
<span class="text-xs font-bold text-gray-600 dark:text-gray-300 tracking-wide">Clients</span>
</div>
<!-- Item 3 -->
<div class="group flex flex-col items-center gap-2 p-3 rounded-2xl bg-white dark:bg-[#152826] shadow-sm border border-transparent hover:border-primary/20 transition-all">
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">monitoring</span>
</div>
<span class="text-xs font-bold text-gray-600 dark:text-gray-300 tracking-wide">Analytics</span>
</div>
</div>
<!-- Spacer to push buttons to the bottom area -->
<div class="flex-1 min-h-[20px]"></div>
<!-- Action Buttons -->
<div class="w-full max-w-sm pb-8 pt-4 flex flex-col gap-3">
<button class="relative w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary hover:bg-[#0b857a] text-[#f8fcfb] text-lg font-bold leading-normal tracking-wide shadow-lg shadow-primary/25 transition-all active:scale-[0.98]">
<span class="truncate">Get Started</span>
<!-- Subtle shine effect -->
<div class="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/10 to-transparent z-10"></div>
</button>
<button class="w-full flex cursor-pointer items-center justify-center rounded-xl h-10 px-4 bg-transparent text-gray-500 dark:text-gray-400 hover:text-rose-gold dark:hover:text-rose-gold text-sm font-bold leading-normal tracking-wide transition-colors">
<span class="truncate">Need Help?</span>
</button>
</div>
</div>
</div>
</body></html>
