<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Post-Consultation Notes</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d968b",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102220",
                        "rosegold": "#C59080", // Custom Rose Gold
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2c2a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                    boxShadow: {
                        "soft": "0 4px 20px -2px rgba(13, 150, 139, 0.08)",
                    }
                },
            },
        }
    </script>
<style>
        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Custom checkbox for aesthetics */
        .checkbox-wrapper input:checked + div {
            background-color: #0d968b;
            border-color: #0d968b;
        }
        .checkbox-wrapper input:checked + div svg {
            display: block;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-gray-100 antialiased overflow-x-hidden pb-24">
<!-- Top App Bar -->
<div class="sticky top-0 z-50 w-full bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-gray-200/50 dark:border-gray-800/50">
<div class="flex items-center justify-between px-4 py-3 h-14">
<button class="flex size-10 items-center justify-center rounded-full active:bg-gray-200 dark:active:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-gray-600 dark:text-gray-300">close</span>
</button>
<h1 class="text-base font-bold text-gray-900 dark:text-white tracking-tight">Post-Consultation</h1>
<button class="flex h-10 items-center justify-center rounded-full px-2 text-primary font-bold text-base hover:text-primary/80 transition-colors">
                Save
            </button>
</div>
</div>
<main class="flex flex-col gap-6 p-4 max-w-lg mx-auto w-full">
<!-- Patient Context Card -->
<div class="bg-surface-light dark:bg-surface-dark rounded-xl p-4 shadow-soft flex items-center gap-4 relative overflow-hidden group">
<div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-primary/10 to-transparent rounded-bl-3xl"></div>
<div class="relative shrink-0">
<div class="w-16 h-16 rounded-full bg-cover bg-center ring-2 ring-primary/20 p-0.5" data-alt="Portrait of patient Jane Doe smiling" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCHfiuX7BcIGUXMG9GHNSOo27fg5l7R-XktX0QBhYEjwo_j4IsKwMFP1rQmho4QHifyhFXGGU9NmeD0yLUU9kRMbLrLzrsRVDC9jf5uO3nc9GMaGc4qTV4K4UzD9JCMxSbh3dvgg31qqd9cep2Qdao34JBvqfBmt6ruNs8Z0T7F1vYk9b8BT_D3hmFCOFfh2tlqLlPbyl8PMCAIDVIPVZnmDMKqAADNL8SBN41ysC6doLUl1InyDc-XMZ5_M9nUGmrK8NXm2jfEaR8g');">
</div>
<div class="absolute bottom-0 right-0 bg-green-500 w-4 h-4 rounded-full border-2 border-white dark:border-surface-dark"></div>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start">
<div>
<h2 class="text-lg font-bold text-gray-900 dark:text-white leading-tight truncate">Jane Doe</h2>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px] text-primary">videocam</span>
                            Video Consult • 10:30 AM
                        </p>
</div>
<span class="inline-flex items-center rounded-full bg-rosegold/10 px-2.5 py-0.5 text-xs font-medium text-rosegold ring-1 ring-inset ring-rosegold/20">
                        VIP
                    </span>
</div>
</div>
</div>
<!-- Clinical Notes Section -->
<section class="flex flex-col gap-3">
<div class="flex items-center justify-between px-1">
<h3 class="text-base font-bold text-gray-800 dark:text-gray-200">Clinical Notes</h3>
<span class="text-xs text-primary font-medium cursor-pointer">Use Templates</span>
</div>
<div class="relative group">
<textarea class="w-full bg-surface-light dark:bg-surface-dark border-0 ring-1 ring-gray-200 dark:ring-gray-700 focus:ring-2 focus:ring-primary rounded-xl p-4 min-h-[180px] text-base resize-none placeholder:text-gray-400 dark:placeholder:text-gray-500 shadow-sm transition-shadow" placeholder="Enter detailed clinical observations, patient concerns, and treatment ideas..."></textarea>
<!-- Voice Input Trigger -->
<button class="absolute bottom-4 right-4 p-2 bg-primary/10 hover:bg-primary/20 text-primary rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" style="font-size: 20px;">mic</span>
</button>
</div>
<!-- Quick Tags -->
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
<button class="shrink-0 px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-xs font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Botox Inquiry</button>
<button class="shrink-0 px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-xs font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Skin Analysis</button>
<button class="shrink-0 px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-xs font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Acne Treatment</button>
</div>
</section>
<!-- Follow-up Action Plan -->
<section class="flex flex-col gap-3">
<h3 class="text-base font-bold text-gray-800 dark:text-gray-200 px-1">Follow-up Actions</h3>
<div class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-soft divide-y divide-gray-100 dark:divide-gray-800 overflow-hidden ring-1 ring-gray-100 dark:ring-gray-800">
<!-- Next Step -->
<div class="p-4 flex flex-col gap-2">
<label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Next Step</label>
<div class="relative">
<select class="w-full appearance-none bg-gray-50 dark:bg-gray-800 border-none rounded-lg py-3 pl-3 pr-10 text-gray-900 dark:text-white focus:ring-1 focus:ring-primary text-sm font-medium">
<option>Schedule In-Clinic Appointment</option>
<option>Send Treatment Plan</option>
<option>Refer to Specialist</option>
<option>No Action Needed</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
<span class="material-symbols-outlined text-sm">expand_more</span>
</div>
</div>
</div>
<!-- Assign Staff -->
<div class="p-4 flex flex-col gap-2">
<label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Assign To</label>
<div class="flex items-center gap-3 p-1">
<img class="w-8 h-8 rounded-full object-cover ring-2 ring-white dark:ring-gray-700 shadow-sm" data-alt="Staff member Sarah smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvUawNKbRsw8LQp6Xykq7Ui9IhWG8slTbbZCtdYnS3a_Vh9EbFC8spvjGiAntx9h9FDtuo0U_fmrUe_eZWNbE2ID8XRF6FvMIG_9MmthqLxUEXer1l3ZJEIJITVyTKr7x4Zbw_irEO3UplmBsfG9ucfht_qf5S40xQ2-CgI7UO3xsue7pY1CHjD1zGDvLnApRzTikCh-xZZlE54qJPXRdmfoYsAqcjd7LdFeQvYjlrllg3tvh-1g91HTq73Xsvhk1erOFIAzhYB2X0"/>
<div class="flex-1 relative">
<select class="w-full appearance-none bg-transparent border-none p-0 text-gray-900 dark:text-white focus:ring-0 text-sm font-medium cursor-pointer">
<option>Sarah Jenkins (Front Desk)</option>
<option>Dr. Emily Chen</option>
<option>Nurse Mike</option>
</select>
</div>
<span class="material-symbols-outlined text-gray-400 text-sm">edit</span>
</div>
</div>
<!-- Due Date -->
<div class="p-4 flex flex-col gap-2">
<label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Due Date</label>
<div class="flex items-center gap-2 bg-gray-50 dark:bg-gray-800 rounded-lg px-3 py-2.5 w-full cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
<span class="material-symbols-outlined text-primary text-[20px]">calendar_today</span>
<input class="bg-transparent border-none p-0 text-sm font-medium text-gray-900 dark:text-white focus:ring-0 w-full" type="date" value="2023-10-27"/>
</div>
</div>
</div>
</section>
<!-- Product Recommendations (Premium/Rose Gold Theme) -->
<section class="flex flex-col gap-3">
<div class="flex items-center justify-between px-1">
<h3 class="text-base font-bold text-gray-800 dark:text-gray-200">Recommendations</h3>
</div>
<button class="relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-rosegold/10 to-rosegold/5 p-[1px] group">
<div class="relative bg-surface-light dark:bg-surface-dark rounded-[11px] p-4 flex items-center justify-between transition-all group-hover:bg-opacity-90">
<div class="flex items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-rosegold/10 text-rosegold">
<span class="material-symbols-outlined">shopping_bag</span> <!-- Typo fix: shopping_bag -->
<span class="material-symbols-outlined">shopping_bag</span>
</div>
<div class="text-left">
<p class="text-sm font-bold text-gray-900 dark:text-white">Select Products to Email</p>
<p class="text-xs text-rosegold">Personalized skincare regime</p>
</div>
</div>
<span class="material-symbols-outlined text-gray-400 group-hover:text-rosegold transition-colors">arrow_forward_ios</span>
</div>
</button>
</section>
<!-- Attachments -->
<section class="flex flex-col gap-3 pb-8">
<h3 class="text-base font-bold text-gray-800 dark:text-gray-200 px-1">Attachments</h3>
<div class="grid grid-cols-2 gap-3">
<!-- Existing File -->
<div class="flex items-center gap-3 p-3 rounded-xl bg-surface-light dark:bg-surface-dark border border-gray-100 dark:border-gray-800 shadow-sm">
<div class="h-10 w-10 rounded-lg bg-red-50 dark:bg-red-900/20 flex items-center justify-center text-red-500">
<span class="material-symbols-outlined">picture_as_pdf</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-sm font-medium text-gray-900 dark:text-white truncate">Face_Scan_v2.pdf</p>
<p class="text-xs text-gray-500">2.4 MB</p>
</div>
<button class="text-gray-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
<!-- Add New Button -->
<button class="flex flex-col items-center justify-center gap-1 h-full min-h-[64px] rounded-xl border-2 border-dashed border-gray-200 dark:border-gray-700 hover:border-primary/50 hover:bg-primary/5 transition-all group">
<span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">add_a_photo</span>
<span class="text-xs font-medium text-gray-500 group-hover:text-primary">Add Photo</span>
</button>
</div>
</section>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-light/90 dark:bg-surface-dark/90 backdrop-blur-lg border-t border-gray-100 dark:border-gray-800 p-4 safe-area-bottom z-50">
<div class="max-w-lg mx-auto flex gap-3">
<button class="flex-1 rounded-xl bg-gray-100 dark:bg-gray-800 py-3.5 text-sm font-bold text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                Draft
            </button>
<button class="flex-[2] rounded-xl bg-primary shadow-lg shadow-primary/25 py-3.5 text-sm font-bold text-white hover:bg-primary/90 transition-all active:scale-[0.98]">
                Complete &amp; Save
            </button>
</div>
</div>
<!-- Safe area spacing for sticky footer -->
<div class="h-24 w-full"></div>
</body></html>
